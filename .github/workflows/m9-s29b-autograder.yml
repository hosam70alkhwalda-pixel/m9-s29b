name: "Stretch 9B Thu — GraphRAG Hybrid Autograder"
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/testtest
          NEO4J_dbms_memory_heap_max__size: 1G
          NEO4J_dbms_memory_pagecache_size: 512M
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget -q -O - http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 24

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testtest
      HF_HUB_DISABLE_TELEMETRY: '1'
      TOKENIZERS_PARALLELISM: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Hugging Face hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-minilm-l6-v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Neo4j Bolt
        run: |
          python - <<'PY'
          import time, sys
          from neo4j import GraphDatabase
          for i in range(60):
              try:
                  d = GraphDatabase.driver("bolt://localhost:7687", auth=("neo4j","testtest"))
                  with d.session() as s: s.run("RETURN 1").consume()
                  d.close(); print("Bolt ready"); sys.exit(0)
              except Exception:
                  time.sleep(2)
          sys.exit("Neo4j Bolt never came up")
          PY

      - name: Load fixture, create vector index, and embed descriptions
        run: python load_fixture.py

      - name: Run autograder
        run: pytest tests/ -v --tb=short
