name: Stretch 9B Thu Autograder

on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  autograder:
    runs-on: ubuntu-latest

    services:
      fuseki:
        image: stain/jena-fuseki:5.0.0
        ports:
          - 3030:3030
        env:
          ADMIN_PASSWORD: admin
          FUSEKI_DATASET_1: recipes
        options: >-
          --health-cmd "curl -sf http://localhost:3030/$/ping || exit 1"
          --health-interval 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install spaCy English model
        run: python -m spacy download en_core_web_sm

      - name: Wait for Fuseki
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3030/$/ping; then
              echo "Fuseki ready"; exit 0
            fi
            sleep 2
          done
          echo "Fuseki did not come up"; exit 1

      - name: Load dataset
        run: |
          set +e
          python load_dataset.py
          echo "load_dataset exit: $?"
          set -e

      - name: Run autograder tests
        run: pytest tests/ -v --tb=short
